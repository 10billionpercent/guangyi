name: Fetch Daily Search Gleam

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-gleam:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Fetch and Save JSON
        run: |
          # Fetch the raw JSON from Microsoft
          DATA=$(curl -s "https://www.bing.com/dsb?setmkt=en-CA&dsbschemaversion=1.1" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; Trident/7.0; rv:11.0; Cortana 1.15.0.0;10.0.22621.1265) like Gecko")
          
          # Extract and validate
          echo "$DATA" | jq '{
            date: .ContentCollection[0].Date,
            text: .ContentCollection[0].Data[0].Cards[0].FieldsStore.GleamData.GleamText,
            lightGleamUrl: .ContentCollection[0].Data[0].Cards[0].FieldsStore.GleamData.LightGleamUrl,
            darkGleamUrl: .ContentCollection[0].Data[0].Cards[0].FieldsStore.GleamData.DarkGleamUrl,
            altText: .ContentCollection[0].Data[0].Cards[0].FieldsStore.GleamData.GleamAltText
          }' > daily_gleam.json

          # Validate that we actually got data back
          if [ "$(jq -r '.date' daily_gleam.json)" == "null" ]; then
            echo "Error: Extraction failed, JSON is invalid or incomplete."
            exit 1
          fi

      - name: Send to Hono Backend
        run: |
          curl -X POST https://backend.10billionpercent.workers.dev/api/gleam \
            -H "Content-Type: application/json" \
            -d @daily_gleam.json

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_gleam.json
          git commit -m "Update daily gleam JSON payload" || echo "No changes to commit"
          git push
