name: Fetch Daily Search Gleam

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-gleam:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Fetch and Save JSON
        run: |
          DATA=$(curl -s "https://www.bing.com/dsb?setmkt=en-US&dsbschemaversion=1.1" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; Trident/7.0; rv:11.0; Cortana 1.15.0.0;10.0.22621.1265) like Gecko")
          
          echo "$DATA" | jq '{
            date: .ContentCollection[0].Date,
            text: .ContentCollection[0].Data[0].Cards[0].FieldsStore.GleamData.GleamText,
            lightGleamUrl: .ContentCollection[0].Data[0].Cards[0].FieldsStore.GleamData.LightGleamUrl,
            darkGleamUrl: .ContentCollection[0].Data[0].Cards[0].FieldsStore.GleamData.DarkGleamUrl,
            altText: .ContentCollection[0].Data[0].Cards[0].FieldsStore.GleamData.GleamAltText
          }' > daily_gleam.json

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_gleam.json
          git commit -m "Update daily gleam JSON payload" || echo "No changes to commit"
          git push
